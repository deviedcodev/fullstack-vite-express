[build]
  command = "pnpm build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["express"]

# Redirect API harus DULU (sebelum SPA fallback)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA fallback untuk React Router (harus di paling bawah)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200